name: HITL Weekly Metrics

# Generates a weekly governance metrics report and posts it as a new issue.
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  generate-metrics:
    name: Generate governance metrics
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Collect and report metrics
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // ── Fetch all HITL issues (open + closed) ──────────────────
            // Fetch issues with any state label (open or closed)
            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'all', per_page: 100,
            });

            const hitl = allIssues.filter(i =>
              i.labels.some(l => l.name.startsWith('state:'))
            );

            const now    = new Date();
            const week   = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            const recentlyClosed = hitl.filter(i =>
              i.state === 'closed' && new Date(i.closed_at) >= week
            );

            const openIssues = hitl.filter(i => i.state === 'open');

            // ── Helper counters ───────────────────────────────────────────
            const countLabel = (issues, prefix) => {
              const tally = {};
              for (const i of issues) {
                const l = i.labels.find(l => l.name.startsWith(prefix));
                const k = l ? l.name : `${prefix}(unset)`;
                tally[k] = (tally[k] ?? 0) + 1;
              }
              return tally;
            };

            const decisions = hitl.filter(i => i.labels.some(l => l.name.startsWith('decision:')));
            const accepted  = decisions.filter(i => i.labels.some(l => l.name === 'decision:accepted')).length;
            const rejected  = decisions.filter(i => i.labels.some(l => l.name === 'decision:rejected')).length;
            const deferred  = decisions.filter(i => i.labels.some(l => l.name === 'decision:deferred')).length;

            const escalated   = openIssues.filter(i => i.labels.some(l => l.name === 'event:escalated')).length;
            const awaitingHuman = openIssues.filter(i => i.labels.some(l => l.name === 'state:awaiting-human')).length;

            // ── Time-to-decision (rough: created → decision label applied) ─
            // GitHub Issues API doesn't expose label timestamps directly;
            // we use a proxy: closed_at for closed issues, or age for open ones.
            const closedDecisions = recentlyClosed.filter(i => i.labels.some(l => l.name.startsWith('decision:')));
            let ttdMedianHours = 'n/a';
            if (closedDecisions.length > 0) {
              const ttds = closedDecisions.map(i =>
                (new Date(i.closed_at) - new Date(i.created_at)) / 3600000
              ).sort((a, b) => a - b);
              const mid = Math.floor(ttds.length / 2);
              ttdMedianHours = ttds.length % 2 === 0
                ? ((ttds[mid - 1] + ttds[mid]) / 2).toFixed(1)
                : ttds[mid].toFixed(1);
            }

            // ── Undocumented decisions (closed, has decision:*, no ADR link) ─
            const undocumented = recentlyClosed.filter(i => {
              const hasDecision = i.labels.some(l => l.name.startsWith('decision:'));
              const hasAdrLink  = /docs\/adr\//i.test(i.body ?? '') || /ADR/i.test(i.body ?? '');
              return hasDecision && !hasAdrLink;
            }).length;

            // ── State distribution ────────────────────────────────────────
            const stateCounts = countLabel(openIssues, 'state:');
            const stateTable  = Object.entries(stateCounts)
              .map(([k, v]) => `| \`${k}\` | ${v} |`).join('\n');

            const riskCounts  = countLabel(openIssues, 'risk:');
            const riskTable   = Object.entries(riskCounts)
              .map(([k, v]) => `| \`${k}\` | ${v} |`).join('\n');

            const reportDate = now.toISOString().split('T')[0];

            // ── Post as new issue ─────────────────────────────────────────
            const body = [
              `## HITL Governance Metrics — Week of ${reportDate}`,
              '',
              '> Auto-generated by the `hitl-metrics` workflow. Do not edit.',
              '',
              '---',
              '',
              '### Pipeline Summary (Open Issues)',
              '',
              '| State | Count |',
              '|---|---|',
              stateTable || '| (none) | 0 |',
              '',
              '### Risk Distribution (Open Issues)',
              '',
              '| Risk Tier | Count |',
              '|---|---|',
              riskTable || '| (none) | 0 |',
              '',
              '---',
              '',
              '### Decision Metrics (All Time)',
              '',
              '| Metric | Value |',
              '|---|---|',
              `| Total decisions recorded | ${decisions.length} |`,
              `| Accepted | ${accepted} |`,
              `| Rejected | ${rejected} |`,
              `| Deferred | ${deferred} |`,
              `| Approval rate | ${decisions.length > 0 ? ((accepted / decisions.length) * 100).toFixed(1) + '%' : 'n/a'} |`,
              '',
              '### Time-to-Decision',
              '',
              '| Metric | Value |',
              '|---|---|',
              `| Median time-to-decision (closed this week) | ${ttdMedianHours} hours |`,
              `| Issues closed this week | ${recentlyClosed.length} |`,
              '',
              '---',
              '',
              '### Health Indicators',
              '',
              '| Indicator | Value | Target |',
              '|---|---|---|',
              `| Open issues awaiting human decision | ${awaitingHuman} | — |`,
              `| Currently escalated (SLA breach) | ${escalated} | 0 |`,
              `| Undocumented decisions (closed this week, no ADR link) | ${undocumented} | 0 |`,
              '',
              '---',
              '',
              `*Report generated: ${now.toISOString()}*`,
            ].join('\n');

            const { data: newIssue } = await github.rest.issues.create({
              owner, repo,
              title: `[HITL Metrics] Week of ${reportDate}`,
              body,
            });
            await github.rest.issues.update({
              owner, repo,
              issue_number: newIssue.number,
              state: 'closed',
            });
            core.info(`Metrics report created: #${newIssue.number}`);

            // Also write to step summary
            await core.summary
              .addHeading(`HITL Metrics — ${reportDate}`)
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Open issues', String(openIssues.length)],
                ['Awaiting human', String(awaitingHuman)],
                ['Escalated', String(escalated)],
                ['Total decisions', String(decisions.length)],
                ['Undocumented decisions (this week)', String(undocumented)],
              ])
              .write();
